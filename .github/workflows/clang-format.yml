---

name: Clang-Format

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - master

jobs:
  clang-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install clang-format 22 from apt.llvm.org
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format-22

      - name: Check formatting tree-wide
        env:
          CLANG_FORMAT: clang-format-22
        run: ./scripts/clang-format-all.sh
