---

name: Build

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  SCCACHE_GHA_ENABLED: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            workflow_preset: linux-x64-ci
          - name: windows
            os: windows-latest
            workflow_preset: windows-x64-ci
          - name: macos
            os: macos-latest
            workflow_preset: macos-arm64-ci
          - name: emscripten
            os: ubuntu-latest
            preset: emscripten

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux' && matrix.name != 'emscripten'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            pkg-config \
            libasound2-dev \
            libpulse-dev \
            libaudio-dev \
            libjack-dev \
            libsndio-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libxtst-dev \
            libxkbcommon-dev \
            libdrm-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libegl1-mesa-dev \
            libdbus-1-dev \
            libudev-dev \
            libwayland-dev \
            libdecor-0-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswresample-dev \
            libswscale-dev

      - name: Setup Emscripten
        if: matrix.name == 'emscripten'
        uses: mymindstorm/setup-emsdk@v16

      - name: Get cmake/ninja
        uses: lukka/get-cmake@latest

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/tools/vcpkg/vcpkg'
          vcpkgConfigurationJsonGlob: 'vcpkg-configuration.json'
          appendedCacheKey: 'sdl3-v2'

      - name: Run cmake
        if: matrix.workflow_preset
        uses: lukka/run-cmake@v10
        with:
          workflowPreset: '${{ matrix.workflow_preset }}'

      - name: Build (Emscripten)
        if: matrix.preset == 'emscripten'
        run: |
          cmake --preset emscripten
          cmake --build build/emscripten --config Release

      - name: Build videotool (Linux)
        if: matrix.name == 'linux'
        run: |
          cmake --preset linux-x64-ci -DOPENLIERO_BUILD_VIDEOTOOL=ON
          cmake --build build/linux-x64-ci --config Release --target videotool

        # build x86_64 binaries so we can create
        # universal binaries for macOS
      - name: Run cmake (macos-x64)
        if: runner.os == 'macos'
        uses: lukka/run-cmake@v10
        with:
          workflowPreset: 'macos-x64-ci'

      - name: Create build artifact (Linux)
        if: matrix.name == 'linux'
        run: |
          cmake --install build/linux-x64-ci --config Release
          cd install/linux-x64-ci
          tar cvf ../openliero-linux-x64.tar.gz .

      - name: Create build artifact (macOS)
        if: runner.os == 'macos'
        run: |
          cmake --install build/macos-arm64-ci --config Release
          cmake --install build/macos-x64-ci --config Release
          lipo -create \
            -output install/openliero \
            install/macos-arm64-ci/openliero \
            install/macos-x64-ci/openliero
          lipo -create \
            -output install/tctool \
            install/macos-arm64-ci/tctool \
            install/macos-x64-ci/tctool
          mv -f install/{openliero,tctool} install/macos-arm64-ci
          cd install/macos-arm64-ci
          tar cvf ../openliero-macos.tar.gz .

      - name: Create build artifact (Windows)
        if: runner.os == 'windows'
        run: |
          cmake --install build/windows-x64-ci --config Release
          Compress-Archive `
           -Path install/windows-x64-ci/* `
           -DestinationPath install/openliero-windows-x64.zip

      - name: Create build artifact (Emscripten)
        if: matrix.name == 'emscripten'
        run: |
          cmake --install build/emscripten --config Release
          cd install/emscripten
          tar cvf ../openliero-web.tar.gz .

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-build
          path: install/openliero*

  pre-release:
    name: Pre-release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate release notes
        id: notes
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          # Find the latest non-prerelease tag for the changelog
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "")

          echo "## Pre-release build" > notes.md
          echo "" >> notes.md
          echo "Built from commit [\`${SHORT_SHA}\`](https://github.com/${{ github.repository }}/commit/${SHA})." >> notes.md
          echo "" >> notes.md
          echo "### Included platforms" >> notes.md
          echo "- Linux x86_64 (includes videotool)" >> notes.md
          echo "- Windows x86_64" >> notes.md
          echo "- macOS universal (arm64 + x86_64)" >> notes.md
          echo "- Web (Emscripten/WebAssembly)" >> notes.md

          if [ -n "$LAST_TAG" ]; then
            echo "" >> notes.md
            echo "### Changes since ${LAST_TAG}" >> notes.md
            echo "" >> notes.md
            git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges >> notes.md
            echo "" >> notes.md
          fi

      - name: Create pre-release
        run: |
          TAG="build-${{ steps.notes.outputs.short_sha }}"
          gh release create "$TAG" \
            --prerelease \
            --title "Build ${{ steps.notes.outputs.short_sha }}" \
            --notes-file notes.md \
            --target "${{ github.sha }}" \
            artifacts/linux-build/* \
            artifacts/windows-build/* \
            artifacts/macos-build/* \
            artifacts/emscripten-build/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --title "${{ github.ref_name }}" \
            artifacts/linux-build/* \
            artifacts/windows-build/* \
            artifacts/macos-build/* \
            artifacts/emscripten-build/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
