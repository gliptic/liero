---

name: Build

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  SCCACHE_GHA_ENABLED: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      CERT_AVAILABLE: ${{ secrets.WINDOWS_CERT_PFX_BASE64 != '' }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            workflow_preset: linux-x64-ci
          - name: windows
            os: windows-latest
            workflow_preset: windows-x64-ci
          - name: macos
            os: macos-latest
            workflow_preset: macos-arm64-ci
          - name: emscripten
            os: ubuntu-latest
            preset: emscripten

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux' && matrix.name != 'emscripten'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            pkg-config \
            libasound2-dev \
            libpulse-dev \
            libaudio-dev \
            libjack-dev \
            libsndio-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libxtst-dev \
            libxkbcommon-dev \
            libdrm-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libegl1-mesa-dev \
            libdbus-1-dev \
            libudev-dev \
            libwayland-dev \
            libdecor-0-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswresample-dev \
            libswscale-dev

      - name: Setup Emscripten
        if: matrix.name == 'emscripten'
        uses: mymindstorm/setup-emsdk@v16

      - name: Get cmake/ninja
        uses: lukka/get-cmake@latest

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/tools/vcpkg/vcpkg'
          vcpkgConfigurationJsonGlob: 'vcpkg-configuration.json'
          appendedCacheKey: 'sdl3-v2'

      - name: Run cmake
        if: matrix.workflow_preset
        uses: lukka/run-cmake@v10
        with:
          workflowPreset: '${{ matrix.workflow_preset }}'

      - name: Build (Emscripten)
        if: matrix.preset == 'emscripten'
        run: |
          cmake --preset emscripten
          cmake --build build/emscripten --config Release

      - name: Build videotool (Linux)
        if: matrix.name == 'linux'
        run: |
          cmake --preset linux-x64-ci -DOPENLIERO_BUILD_VIDEOTOOL=ON
          cmake --build build/linux-x64-ci --config Release --target videotool

        # build x86_64 binaries so we can create
        # universal binaries for macOS
      - name: Run cmake (macos-x64)
        if: runner.os == 'macos'
        uses: lukka/run-cmake@v10
        with:
          workflowPreset: 'macos-x64-ci'

      - name: Create build artifact (Linux)
        if: matrix.name == 'linux'
        run: |
          cmake --install build/linux-x64-ci --config Release
          # Stage a flat portable archive. The FHS layout (bin/ + share/) does
          # not work with portable.txt because SDL_GetBasePath returns bin/ and
          # the game would not find TC/ there.
          mkdir -p staging-linux
          cp install/linux-x64-ci/bin/openliero staging-linux/
          cp install/linux-x64-ci/bin/tctool staging-linux/
          [ -f install/linux-x64-ci/bin/videotool ] && cp install/linux-x64-ci/bin/videotool staging-linux/ || true
          cp -r install/linux-x64-ci/share/openliero/. staging-linux/
          cp -r install/linux-x64-ci/LICENSES staging-linux/
          touch staging-linux/portable.txt
          cd staging-linux && tar czf ../install/openliero-linux-x64-portable.tar.gz .

      - name: Create build artifact (macOS)
        if: runner.os == 'macos'
        run: |
          cmake --install build/macos-arm64-ci --config Release
          cmake --install build/macos-x64-ci --config Release
          lipo -create \
            -output install/openliero \
            install/macos-arm64-ci/bin/openliero \
            install/macos-x64-ci/bin/openliero
          lipo -create \
            -output install/tctool \
            install/macos-arm64-ci/bin/tctool \
            install/macos-x64-ci/bin/tctool
          mv -f install/{openliero,tctool} install/macos-arm64-ci/bin
          # Stage a flat portable archive (same reason as Linux).
          mkdir -p staging-macos
          cp install/macos-arm64-ci/bin/openliero staging-macos/
          cp install/macos-arm64-ci/bin/tctool staging-macos/
          cp -r install/macos-arm64-ci/share/openliero/. staging-macos/
          cp -r install/macos-arm64-ci/LICENSES staging-macos/
          touch staging-macos/portable.txt
          cd staging-macos && tar czf ../install/openliero-macos-portable.tar.gz .

      - name: Install (Windows)
        if: runner.os == 'Windows'
        run: cmake --install build/windows-x64-ci --config Release

      - name: Sign EXE (Windows)
        if: runner.os == 'Windows' && env.CERT_AVAILABLE == 'true'
        env:
          CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          Write-Output "::add-mask::$env:CERT_PASSWORD"
          $sdkBin = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Directory |
            Where-Object { $_.Name -match '^\d' } | Sort-Object Name -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          $signtool = Join-Path $sdkBin "x64\signtool.exe"
          $pfxBytes = [Convert]::FromBase64String($env:CERT_PFX_BASE64)
          [IO.File]::WriteAllBytes('codesign.pfx', $pfxBytes)
          & $signtool sign /fd SHA256 /f codesign.pfx /p $env:CERT_PASSWORD `
            /tr http://timestamp.digicert.com /td SHA256 `
            install/windows-x64-ci/openliero.exe
          Remove-Item codesign.pfx -Force

      - name: Stage and pack MSIX (Windows)
        if: runner.os == 'Windows'
        run: |
          $sdkBin = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Directory |
            Where-Object { $_.Name -match '^\d' } | Sort-Object Name -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          $makeappx = Join-Path $sdkBin "x64\makeappx.exe"

          New-Item -ItemType Directory -Path msix-staging/Assets -Force | Out-Null
          Copy-Item -Path install/windows-x64-ci/* -Destination msix-staging/ -Recurse -Force
          Copy-Item build/windows-x64-ci/AppxManifest.xml msix-staging/

          magick "packaging/icons/openliero.ico[0]" -resize 44x44   msix-staging/Assets/Square44x44Logo.png
          magick "packaging/icons/openliero.ico[0]" -resize 150x150  msix-staging/Assets/Square150x150Logo.png
          magick "packaging/icons/openliero.ico[0]" -resize 50x50    msix-staging/Assets/StoreLogo.png

          & $makeappx pack /d msix-staging /p install/openliero.msix /o

      - name: Sign MSIX (Windows)
        if: runner.os == 'Windows' && env.CERT_AVAILABLE == 'true'
        env:
          CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          Write-Output "::add-mask::$env:CERT_PASSWORD"
          $sdkBin = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Directory |
            Where-Object { $_.Name -match '^\d' } | Sort-Object Name -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          $signtool = Join-Path $sdkBin "x64\signtool.exe"
          $pfxBytes = [Convert]::FromBase64String($env:CERT_PFX_BASE64)
          [IO.File]::WriteAllBytes('codesign.pfx', $pfxBytes)
          & $signtool sign /fd SHA256 /f codesign.pfx /p $env:CERT_PASSWORD `
            /tr http://timestamp.digicert.com /td SHA256 `
            install/openliero.msix
          Remove-Item codesign.pfx -Force

      - name: Package ZIP and copy publisher cert (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType File -Path install/windows-x64-ci/portable.txt | Out-Null
          Compress-Archive `
            -Path install/windows-x64-ci/* `
            -DestinationPath install/openliero-windows-x64-portable.zip
          if (Test-Path dist/windows/openliero-publisher.cer) {
            Copy-Item dist/windows/openliero-publisher.cer install/openliero-publisher.cer
          }

      - name: Create build artifact (Emscripten)
        if: matrix.name == 'emscripten'
        run: |
          cmake --install build/emscripten --config Release
          cd install/emscripten
          tar cvf ../openliero-web.tar.gz .

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-build
          path: install/openliero*

  flatpak:
    name: Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: openliero.flatpak
          manifest-path: packaging/io.github.openliero.openliero.yml
          cache-key: flatpak-builder-${{ hashFiles('packaging/io.github.openliero.openliero.yml', 'packaging/patches/*.diff') }}
          upload-artifact: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: flatpak-build
          path: openliero.flatpak

  pre-release:
    name: Pre-release
    needs: [build, flatpak]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate SHA256SUMS
        run: |
          find artifacts -type f | sort | xargs sha256sum | sed 's|artifacts/[^/]*/||' > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: openliero-sbom.cdx.json
          upload-artifact: false

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            artifacts/linux-build/*
            artifacts/windows-build/*
            artifacts/macos-build/*
            artifacts/emscripten-build/*
            artifacts/flatpak-build/*

      - name: Generate release notes
        id: notes
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          # Find the latest non-prerelease tag for the changelog
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "")

          echo "## Pre-release build" > notes.md
          echo "" >> notes.md
          echo "Built from commit [\`${SHORT_SHA}\`](https://github.com/${{ github.repository }}/commit/${SHA})." >> notes.md
          echo "" >> notes.md
          echo "### Included platforms" >> notes.md
          echo "- \`openliero-linux-x64-portable.tar.gz\` — Linux x86_64 (includes videotool)" >> notes.md
          echo "- \`openliero-windows-x64-portable.zip\` — Windows x86_64 portable" >> notes.md
          echo "- \`openliero.msix\` — Windows MSIX installer (saves to %APPDATA%)" >> notes.md
          echo "- \`openliero-macos-portable.tar.gz\` — macOS universal (arm64 + x86_64)" >> notes.md
          echo "- \`openliero-web.tar.gz\` — Web (Emscripten/WebAssembly)" >> notes.md
          echo "- \`openliero.flatpak\` — Linux Flatpak bundle (\`flatpak install --user openliero.flatpak\`)" >> notes.md
          echo "" >> notes.md
          echo "Portable archives include \`portable.txt\` — extract anywhere and run. See README for details." >> notes.md

          if [ -n "$LAST_TAG" ]; then
            echo "" >> notes.md
            echo "### Changes since ${LAST_TAG}" >> notes.md
            echo "" >> notes.md
            git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges >> notes.md
            echo "" >> notes.md
          fi

          echo "" >> notes.md
          echo "### Verifying your download" >> notes.md
          echo "" >> notes.md
          echo "Check integrity with the included \`SHA256SUMS.txt\`:" >> notes.md
          echo "\`\`\`" >> notes.md
          echo "sha256sum -c SHA256SUMS.txt" >> notes.md
          echo "\`\`\`" >> notes.md
          echo "Verify build provenance (requires [GitHub CLI](https://cli.github.com/)):" >> notes.md
          echo "\`\`\`" >> notes.md
          echo "gh attestation verify <artifact-file> --repo ${{ github.repository }}" >> notes.md
          echo "\`\`\`" >> notes.md

      - name: Create pre-release
        run: |
          TAG="build-${{ steps.notes.outputs.short_sha }}"
          gh release create "$TAG" \
            --prerelease \
            --title "Build ${{ steps.notes.outputs.short_sha }}" \
            --notes-file notes.md \
            --target "${{ github.sha }}" \
            artifacts/linux-build/* \
            artifacts/windows-build/* \
            artifacts/macos-build/* \
            artifacts/emscripten-build/* \
            artifacts/flatpak-build/* \
            SHA256SUMS.txt \
            openliero-sbom.cdx.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    needs: [build, flatpak]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate SHA256SUMS
        run: |
          find artifacts -type f | sort | xargs sha256sum | sed 's|artifacts/[^/]*/||' > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: openliero-sbom.cdx.json
          upload-artifact: false

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            artifacts/linux-build/*
            artifacts/windows-build/*
            artifacts/macos-build/*
            artifacts/emscripten-build/*
            artifacts/flatpak-build/*

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --title "${{ github.ref_name }}" \
            artifacts/linux-build/* \
            artifacts/windows-build/* \
            artifacts/macos-build/* \
            artifacts/emscripten-build/* \
            artifacts/flatpak-build/* \
            SHA256SUMS.txt \
            openliero-sbom.cdx.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
