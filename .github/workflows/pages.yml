---

name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [master]

permissions:
  contents: write
  actions: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          fetch-depth: 1
        continue-on-error: true
        id: checkout

      - name: Initialize gh-pages branch
        if: steps.checkout.outcome == 'failure'
        run: |
          git init
          git checkout --orphan gh-pages
          echo '{}' > builds.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Initialize gh-pages"

      - name: Enumerate releases and deploy builds
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo '{"releases":[],"dev":[]}' > builds_new.json

          # Helper: process a release entry (download if needed, add to manifest)
          process_release() {
            local TAG="$1" TYPE="$2" CREATED="$3"
            local DIR

            if [ "$TYPE" = "dev" ]; then
              DIR="dev/${TAG}"
            else
              DIR="releases/${TAG}"
            fi

            # Skip download if already deployed
            if [ ! -d "$DIR" ]; then
              mkdir -p "$DIR"
              if ! gh release download "$TAG" --repo "${{ github.repository }}" \
                --pattern "openliero-web.tar.gz" --dir /tmp/dl --clobber 2>/dev/null; then
                # No web asset in this release, skip
                rm -rf "$DIR"
                return
              fi
              tar xf /tmp/dl/openliero-web.tar.gz -C "$DIR"
              rm -f /tmp/dl/openliero-web.tar.gz
            fi

            python3 -c "
          import json
          with open('builds_new.json') as f:
              m = json.load(f)
          entry = {'name': '$TAG', 'dir': '$DIR', 'timestamp': '$CREATED'}
          m['$TYPE'].append(entry)
          with open('builds_new.json', 'w') as f:
              json.dump(m, f, indent=2)
          "
          }

          # Fetch all stable releases (should be few)
          gh release list --repo "${{ github.repository }}" --limit 50 \
            --exclude-pre-releases --json tagName,createdAt | \
          jq -c '.[]' | \
          while IFS= read -r release; do
            TAG=$(echo "$release" | jq -r '.tagName')
            CREATED=$(echo "$release" | jq -r '.createdAt')
            process_release "$TAG" "release" "$CREATED"
          done

          # Fetch only the last 10 pre-releases (fetch extra, filter with jq)
          gh release list --repo "${{ github.repository }}" --limit 30 \
            --json tagName,isPrerelease,createdAt | \
          jq -c '[.[] | select(.isPrerelease == true)] | .[:10] | .[]' | \
          while IFS= read -r release; do
            TAG=$(echo "$release" | jq -r '.tagName')
            CREATED=$(echo "$release" | jq -r '.createdAt')
            process_release "$TAG" "dev" "$CREATED"
          done

          # Sort, prune, and clean up old directories
          python3 << 'PYEOF'
          import json, os, shutil

          with open("builds_new.json") as f:
              manifest = json.load(f)

          manifest["releases"].sort(key=lambda x: x["timestamp"], reverse=True)
          manifest["dev"].sort(key=lambda x: x["timestamp"], reverse=True)

          # Keep all releases, last 10 dev builds
          removed = manifest["dev"][10:]
          manifest["dev"] = manifest["dev"][:10]
          for old in removed:
              if os.path.isdir(old["dir"]):
                  shutil.rmtree(old["dir"])

          # Remove deployed dirs no longer in manifest
          keep_dirs = {b["dir"] for b in manifest["releases"] + manifest["dev"]}
          for prefix in ["releases", "dev"]:
              if os.path.isdir(prefix):
                  for entry in os.listdir(prefix):
                      path = f"{prefix}/{entry}"
                      if path not in keep_dirs and os.path.isdir(path):
                          shutil.rmtree(path)

          with open("builds.json", "w") as f:
              json.dump(manifest, f, indent=2)
          PYEOF

      - name: Generate index.html
        run: |
          python3 << 'EOF'
          import json

          with open("builds.json") as f:
              manifest = json.load(f)

          html = """<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Open Liero - Web Builds</title>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: #1a1a2e;
                color: #e0e0e0;
                min-height: 100vh;
                padding: 2rem;
              }
              .container { max-width: 700px; margin: 0 auto; }
              h1 {
                text-align: center;
                margin-bottom: 0.5rem;
                color: #fff;
                font-size: 2rem;
              }
              .subtitle {
                text-align: center;
                color: #888;
                margin-bottom: 2rem;
              }
              h2 {
                color: #4fc3f7;
                margin: 1.5rem 0 0.75rem;
                padding-bottom: 0.25rem;
                border-bottom: 1px solid #333;
              }
              .build-list { list-style: none; }
              .build-list li {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0.6rem 0.8rem;
                border-radius: 6px;
                margin-bottom: 0.4rem;
                background: #16213e;
              }
              .build-list li:hover { background: #1a2a4a; }
              .build-name { font-weight: 600; }
              .build-date { color: #888; font-size: 0.85rem; }
              .build-link {
                background: #4fc3f7;
                color: #1a1a2e;
                text-decoration: none;
                padding: 0.3rem 0.8rem;
                border-radius: 4px;
                font-weight: 600;
                font-size: 0.85rem;
              }
              .build-link:hover { background: #81d4fa; }
              .dl-link {
                background: #333;
                color: #e0e0e0;
                text-decoration: none;
                padding: 0.3rem 0.5rem;
                border-radius: 4px;
                font-size: 0.75rem;
              }
              .dl-link:hover { background: #444; color: #fff; }
              .build-actions { display: flex; gap: 0.3rem; align-items: center; }
              .empty { color: #666; font-style: italic; padding: 0.5rem 0; }
              a { color: #4fc3f7; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>🪱 Open Liero</h1>
              <p class="subtitle">Select a build to play in your browser</p>
          """

          REPO = "openliero/openliero"
          DL = f"https://github.com/{REPO}/releases/download"

          html += "    <h2>Releases</h2>\n"
          if manifest["releases"]:
              html += '    <ul class="build-list">\n'
              for build in manifest["releases"]:
                  tag = build["name"]
                  date = build["timestamp"][:10] if build.get("timestamp") else ""
                  html += f'      <li><span class="build-name">{tag}</span>'
                  html += f'<span class="build-date">{date}</span>'
                  html += '<span class="build-actions">'
                  html += f'<a class="dl-link" href="{DL}/{tag}/openliero-linux-x64.tar.gz" title="Linux x64">🐧</a>'
                  html += f'<a class="dl-link" href="{DL}/{tag}/openliero-windows-x64.zip" title="Windows x64">🪟</a>'
                  html += f'<a class="dl-link" href="{DL}/{tag}/openliero-macos.tar.gz" title="macOS">🍎</a>'
                  html += f'<a class="build-link" href="{build["dir"]}/openliero.html">Play</a>'
                  html += '</span></li>\n'
              html += "    </ul>\n"
          else:
              html += '    <p class="empty">No releases yet</p>\n'

          html += "    <h2>Development Builds</h2>\n"
          if manifest["dev"]:
              html += '    <ul class="build-list">\n'
              for build in manifest["dev"]:
                  tag = build["name"]
                  date = build["timestamp"][:10] if build.get("timestamp") else ""
                  html += f'      <li><span class="build-name">{tag}</span>'
                  html += f'<span class="build-date">{date}</span>'
                  html += '<span class="build-actions">'
                  html += f'<a class="dl-link" href="{DL}/{tag}/openliero-linux-x64.tar.gz" title="Linux x64">🐧</a>'
                  html += f'<a class="dl-link" href="{DL}/{tag}/openliero-windows-x64.zip" title="Windows x64">🪟</a>'
                  html += f'<a class="dl-link" href="{DL}/{tag}/openliero-macos.tar.gz" title="macOS">🍎</a>'
                  html += f'<a class="build-link" href="{build["dir"]}/openliero.html">Play</a>'
                  html += '</span></li>\n'
              html += "    </ul>\n"
          else:
              html += '    <p class="empty">No development builds yet</p>\n'

          html += """    <p style="text-align:center; margin-top:2rem; color:#666; font-size:0.8rem;">
                <a href="https://github.com/openliero/openliero">Source on GitHub</a>
              </p>
            </div>
          </body>
          </html>"""

          with open("index.html", "w") as f:
              f.write(html)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update pages from releases" || echo "No changes"
          git push origin gh-pages
