---

name: Clang-Tidy

# Gating model (post clang flag-day): one job per trigger. Each job
# checks out, runs the shared `.github/actions/clang-tidy-setup`
# composite action to install deps + configure + build, then runs
# whichever tidy invocation that trigger calls for. Only the job whose
# `if:` matches actually executes for a given event; the others are
# skipped at the job level (zero runner cost).
on:  # yamllint disable-line rule:truthy
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'  # 03:17 UTC daily

env:
  SCCACHE_GHA_ENABLED: true

jobs:
  # PRs: diff-only against origin/master. Fast (~1-2 min); blocks merge
  # on any tidy violation the PR introduces on the lines it changes.
  pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/clang-tidy-setup

      - name: Run clang-tidy (diff-only vs origin/master)
        run: ./scripts/clang-tidy-diff.sh build/linux-x64-ci

  # Push to master: diff-only against the pre-push SHA. Mirrors the PR
  # check on the merge commit itself, so violations the merge introduces
  # surface immediately rather than waiting for the nightly.
  push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/clang-tidy-setup

      - name: Run clang-tidy (diff-only vs pre-push SHA)
        run: ./scripts/clang-tidy-diff.sh build/linux-x64-ci "${{ github.event.before }}"

  # Tree-wide: workflow_dispatch (on-demand, after a tidy version bump
  # or .clang-tidy edit) and nightly schedule. Nightly is skipped when
  # master HEAD matches the SHA of the last successful nightly run
  # (cached via actions/cache with a per-SHA key + prefix restore-keys),
  # so idle nights cost nothing while drift from tidy updates or
  # upstream header changes still surfaces within 24h.
  tree_wide:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Restore last-success SHA (nightly)
        if: github.event_name == 'schedule'
        uses: actions/cache/restore@v4
        with:
          path: .last-clang-tidy-success-sha
          key: clang-tidy-success-${{ github.sha }}
          restore-keys: |
            clang-tidy-success-

      - name: Decide whether to run (nightly)
        if: github.event_name == 'schedule'
        id: gate
        run: |
          if [ -f .last-clang-tidy-success-sha ]; then
            last=$(cat .last-clang-tidy-success-sha)
            current=$(git rev-parse HEAD)
            if [ "$last" = "$current" ]; then
              echo "No new commits since last successful nightly ($last); skipping."
              echo "skip=true" >>"$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Last success: $last; current HEAD: $current; running."
          else
            echo "No prior success recorded; running."
          fi
          echo "skip=false" >>"$GITHUB_OUTPUT"

      - uses: ./.github/actions/clang-tidy-setup
        if: steps.gate.outputs.skip != 'true'

      - name: Run clang-tidy tree-wide
        if: steps.gate.outputs.skip != 'true'
        run: ./scripts/clang-tidy-all.sh build/linux-x64-ci

      - name: Record last-success SHA (nightly)
        if: github.event_name == 'schedule' && steps.gate.outputs.skip != 'true' && success()
        run: git rev-parse HEAD > .last-clang-tidy-success-sha

      - name: Save last-success SHA (nightly)
        if: github.event_name == 'schedule' && steps.gate.outputs.skip != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: .last-clang-tidy-success-sha
          key: clang-tidy-success-${{ github.sha }}
